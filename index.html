<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Karyawan</title>
    <link rel="icon" type="image/png" href="https://iili.io/F0B1fSf.jpg">
    <style>
        /* Menggunakan dvh (Dynamic Viewport Height) agar pas di HP */
        body, html {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            height: 100dvh; 
            overflow: hidden; 
            background-color: #ffffff;
            font-family: sans-serif;
            display: flex; 
            flex-direction: column;
        }
        
        /* Area Konten */
        .content {
            flex: 1; /* Mengambil sisa ruang yang tersedia */
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none; 
            display: none;
        }

        iframe.active { display: block; }

        /* Navigasi Bawah */
        .bottom-nav {
            height: 65px; /* Sedikit lebih tinggi agar nyaman di jempol */
            display: flex;
            background-color: #f8f9fa; 
            border-top: 1px solid #ddd;
            padding-bottom: env(safe-area-inset-bottom); /* Support iPhone modern */
            box-sizing: content-box;
        }
        
        .tab-btn {
            flex: 1; border: none; background: transparent;
            font-size: 13px; cursor: pointer; font-weight: bold;
            outline: none; transition: 0.2s;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* Tombol Absensi (Hijau) */
        #btnAbsen { color: #188038; border-right: 1px solid #eee; }
        #btnAbsen.active { background-color: #e6f4ea; border-top: 4px solid #188038; }

        /* Tombol Rekap (Kuning/Orange) */
        #btnRekap { color: #d48806; border-right: 1px solid #eee; }
        #btnRekap.active { background-color: #fffbe6; border-top: 4px solid #d48806; }

        /* Tombol Neraca (Biru) */
        #btnNeraca { color: #1a73e8; }
        #btnNeraca.active { background-color: #e8f0fe; border-top: 4px solid #1a73e8; }
    </style>
</head>
<body>

    <div class="content">
        <iframe id="frameAbsen" class="active" allow="geolocation" 
            src="https://script.google.com/a/~/macros/s/AKfycby0FtbUF2gOVQysy8UXRXR2-3j9Glpk5Mz5Vn5l1odopvU0oD-BcPAeLTj1fnvqO3_Oaw/exec"></iframe>
        
        <iframe id="frameRekap" allow="geolocation" 
            src="https://script.google.com/a/~/macros/s/AKfycbyNuxRagtmcaBJCV3lcYXdeqcXnXse4Quo8PlvfGnFJotDnxDOSAepWQlRRA-nFBv5zEA/exec"></iframe>
            
        <iframe id="frameNeraca" allow="geolocation" 
            src="https://script.google.com/a/~/macros/s/AKfycbyIl6WmETQ_a2aAVgl8sz3NJYQAlcsmnqOTG2IjQiPBbNEIFtssNc3kbutCYxq6kkwd/exec"></iframe>
    </div>

    <div class="bottom-nav">
        <button id="btnAbsen" class="tab-btn active" onclick="switchTab('absen')">
            <span>📍</span>
            Presensi
        </button>
        <button id="btnRekap" class="tab-btn" onclick="switchTab('rekap')">
            <span>📊</span>
            Rekap
        </button>
        <button id="btnNeraca" class="tab-btn" onclick="switchTab('neraca')">
            <span>⚖️</span>
            Neraca
        </button>
    </div>

    <script>
        function switchTab(tab) {
            // Ambil semua elemen iframe
            const fAbsen = document.getElementById('frameAbsen');
            const fRekap = document.getElementById('frameRekap');
            const fNeraca = document.getElementById('frameNeraca');
            
            // Ambil semua elemen tombol
            const bAbsen = document.getElementById('btnAbsen');
            const bRekap = document.getElementById('btnRekap');
            const bNeraca = document.getElementById('btnNeraca');

            // Hapus class 'active' dari semua elemen (Reset)
            fAbsen.classList.remove('active');
            fRekap.classList.remove('active');
            fNeraca.classList.remove('active');
            bAbsen.classList.remove('active');
            bRekap.classList.remove('active');
            bNeraca.classList.remove('active');

            // Tambahkan class 'active' hanya pada tab yang diklik
            if (tab === 'absen') {
                fAbsen.classList.add('active');
                bAbsen.classList.add('active');
            } else if (tab === 'rekap') {
                fRekap.classList.add('active');
                bRekap.classList.add('active');
            } else if (tab === 'neraca') {
                fNeraca.classList.add('active');
                bNeraca.classList.add('active');
            }
        }
    </script>
</body>
</html>
