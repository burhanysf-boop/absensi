<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>Sistem Karyawan</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            overflow: hidden; background-color: #ffffff;
            font-family: sans-serif;
            display: flex; flex-direction: column;
        }
        
        iframe {
            flex: 1; width: 100%; border: none; display: none;
        }

        iframe.active { display: block; }

        .bottom-nav {
            height: 60px; display: flex;
            background-color: #f8f9fa; border-top: 1px solid #ddd;
        }
        
        .tab-btn {
            flex: 1; border: none; background: transparent;
            font-size: 14px; cursor: pointer; font-weight: bold;
            outline: none; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }

        /* Tombol Absensi (Hijau) */
        #btnAbsen { color: #188038; }
        #btnAbsen.active { background-color: #e6f4ea; border-top: 3px solid #188038; }

        /* Tombol Rekap (Kuning/Emas) */
        #btnRekap { color: #d48806; }
        #btnRekap.active { background-color: #fffbe6; border-top: 3px solid #d48806; }
    </style>
</head>
<body>

    <!-- Pastikan URL di bawah ini sudah versi PUBLIC (Anyone) -->
    <iframe id="frameAbsen" class="active" allow="geolocation" 
        src="https://script.google.com/macros/s/AKfycbxzcPb1ISQqAQFVsoHArOBr90N4fW_yUyKdnMZu7-o0AgC7SWFXw_9LTGUGDwBXgewn/exec"></iframe>
    
    <iframe id="frameRekap" allow="geolocation" 
        src="https://script.google.com/macros/s/AKfycbwfyoL6tzGwZfcSwXJfIY2NDgsCxR-W3-dZNfvsO7pGlzmsJpX33dFSAdenIxqBlYHL/exec"></iframe>

    <div class="bottom-nav">
        <button id="btnAbsen" class="tab-btn active" onclick="switchTab('absen')">Presensi Karyawan</button>
        <button id="btnRekap" class="tab-btn" onclick="switchTab('rekap')">Rekap Transaksi</button>
    </div>

    <script>
        function switchTab(tab) {
            const fAbsen = document.getElementById('frameAbsen');
            const fRekap = document.getElementById('frameRekap');
            const bAbsen = document.getElementById('btnAbsen');
            const bRekap = document.getElementById('btnRekap');

            if (tab === 'absen') {
                fAbsen.classList.add('active');
                fRekap.classList.remove('active');
                bAbsen.classList.add('active');
                bRekap.classList.remove('active');
            } else {
                fRekap.classList.add('active');
                fAbsen.classList.remove('active');
                bRekap.classList.add('active');
                bAbsen.classList.remove('active');
            }
        }
    </script>
</body>
</html>
